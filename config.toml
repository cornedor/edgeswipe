[touchpad]
# device = "/dev/input/event5"  # auto-detect if omitted

[gesture]
edge_zone = 0.15
distance_threshold = 200.0
velocity_threshold = 100.0
cooldown_ms = 500

# Open notification bar and grab touchpad
[[bindings]]
edge = "right"
fingers = 2
direction = "left"
command = "hyprctl dispatch global quickshell:sidepanel"
grab = true

# Close notification bar and release (only active while grabbed)
[[bindings]]
mode = "grabbed"
edge = "any"
fingers = 2
direction = "right"
ungrab = true
